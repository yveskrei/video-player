[package]
name = "ffi_library"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"

[dependencies]
anyhow = "1.0.102"
libc = "0.2.185"
parking_lot = "0.12.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52", features = ["rt-multi-thread", "macros", "sync", "time"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["fmt", "json", "env-filter", "ansi"] }

# HTTP client — async for results posting, blocking for the long-lived video pulls.
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "blocking", "stream", "http2"] }

# FFmpeg bindings, statically linked via build_library.sh. ffmpeg-next 7.x targets
# FFmpeg 6.x, which matches the version built by build_dependencies.sh.
# (ffmpeg-next 8.x would require FFmpeg 7.x, meaning a full rebuild of the stack.)
ffmpeg-next = { version = "7.1", features = ["static"] }

[lib]
crate-type = ["cdylib"]
name = "ffi_client_video"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
strip = "debuginfo"
